version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: careplan-postgres
    environment:
      POSTGRES_DB: careplan
      POSTGRES_USER: careplan_user
      POSTGRES_PASSWORD: careplan_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careplan_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 消息队列
  redis:
    image: redis:7-alpine
    container_name: careplan-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot 应用
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: careplan-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # 数据库连接配置（固定值，和上面的 postgres 配置一致）
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/careplan
      SPRING_DATASOURCE_USERNAME: careplan_user
      SPRING_DATASOURCE_PASSWORD: careplan_password
      # Redis 配置
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      # LLM API 配置（从 .env 读取）
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_API_URL: ${LLM_API_URL:-https://api.openai.com/v1/chat/completions}
      # 调试配置
      JAVA_TOOL_OPTIONS: -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
    ports:
      - "8080:8080"
      - "5005:5005"  # 调试端口
    restart: unless-stopped

volumes:
  postgres_data:

