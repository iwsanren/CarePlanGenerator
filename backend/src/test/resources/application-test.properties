spring.application.name=careplan-backend-test

# Use in-memory DB for integration tests
spring.datasource.url=jdbc:h2:mem:careplan_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Avoid migration differences in test profile
spring.flyway.enabled=false

# Keep background jobs quiet during API tests
spring.task.scheduling.enabled=false

# LLM is not needed in these tests
llm.mock.enabled=true

# Tests do not need Redis auto-configuration.
spring.autoconfigure.exclude=org.springframework.boot.data.redis.autoconfigure.DataRedisAutoConfiguration,org.springframework.boot.data.redis.autoconfigure.DataRedisRepositoriesAutoConfiguration

# Avoid eager creation of unrelated infrastructure beans during tests.
spring.main.lazy-initialization=true
